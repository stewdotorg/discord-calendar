services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - bot

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./service-account.json:/app/service-account.json:ro
      - bot_data:/app/data

volumes:
  caddy_data:
  bot_data:
